# H2 Database Console (allows you to see the database in your browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database connection settings
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Settings - VERY IMPORTANT FOR COMMIT 2
# 'create-drop' means: Create the table when we run, delete it when we stop.
spring.jpa.hibernate.ddl-auto=create-drop

# Show the raw SQL in the console so we can see Hibernate creating the table!
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true